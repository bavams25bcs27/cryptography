<!DOCTYPE html>
<html>
<head>
  <title>Cryptography Ciphers</title>
</head>
<body>
  <h2>Cryptography Algorithms</h2>

  <label>Cipher:</label>
  <select id="cipher">
    <option value="affine">Affine</option>
    <option value="vigenere">Vigenere</option>
    <option value="playfair">Playfair</option>
  </select>

  <br><br>

  <label>Mode:</label>
  <select id="mode">
    <option value="encrypt">Encrypt</option>
    <option value="decrypt">Decrypt</option>
  </select>

  <br><br>

  <textarea id="text" placeholder="Enter text"></textarea>

  <br><br>

  <label>Key:</label>
  <input id="key">

  <label>a:</label>
  <input id="a" type="number">

  <label>b:</label>
  <input id="b" type="number">

  <br><br>

  <button onclick="process()">Submit</button>

  <h3>Output:</h3>
  <p id="output"></p>

  <script>
    function process() {
      fetch("/process", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          cipher: cipher.value,
          mode: mode.value,
          text: text.value,
          key: key.value,
          a: a.value,
          b: b.value
        })
      })
      .then(res => res.json())
      .then(data => output.innerText = data.result);
    }
  </script>
</body>
</html>
