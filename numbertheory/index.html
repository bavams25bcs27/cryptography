<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Toolkit</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; margin: 0; height: 100vh; background: #f0f2f5; }

        /* Side Menu */
        .sidebar { width: 250px; background: #2c3e50; color: white; display: flex; flex-direction: column; padding: 20px; }
        .sidebar h2 { font-size: 1.2rem; margin-bottom: 30px; color: #3498db; }
        .sidebar button {
            background: none; border: 1px solid #34495e; color: white; padding: 12px;
            text-align: left; cursor: pointer; margin-bottom: 10px; border-radius: 5px; transition: 0.3s;
        }
        .sidebar button:hover { background: #34495e; }
        .sidebar button.active { background: #3498db; border-color: #3498db; }

        /* Main Content */
        .main-content { flex-grow: 1; padding: 50px; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 500px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button#calc-btn { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; }
        #result-box { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; font-weight: bold; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Number Theory</h2>
        <button onclick="switchMode('euler')" id="btn-euler" class="active">Euler's Totient</button>
        <button onclick="switchMode('fermat')" id="btn-fermat">Fermat's Inverse</button>
    </div>

    <div class="main-content">
        <div class="card">
            <h1 id="title">Euler's Totient Function</h1>
            <p id="description">Calculates $\phi(n)$ (count of numbers coprime to $n$).</p>

            <div id="inputs">
                <!-- Inputs change dynamically -->
                <input type="number" id="val1" placeholder="Enter number (n)">
            </div>

            <button id="calc-btn" onclick="calculate()">Calculate</button>

            <div id="result-box"></div>
        </div>
    </div>

    <script>
        let currentMode = 'euler';

        function switchMode(mode) {
            currentMode = mode;
            document.getElementById('btn-euler').classList.toggle('active', mode === 'euler');
            document.getElementById('btn-fermat').classList.toggle('active', mode === 'fermat');

            const title = document.getElementById('title');
            const inputs = document.getElementById('inputs');
            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'none';

            if (mode === 'euler') {
                title.innerText = "Euler's Totient Function";
                inputs.innerHTML = '<input type="number" id="val1" placeholder="Enter number (n)">';
            } else {
                title.innerText = "Fermat's Modular Inverse";
                inputs.innerHTML = `
                    <input type="number" id="val1" placeholder="Enter number (a)">
                    <input type="number" id="val2" placeholder="Enter prime (p)">
                `;
            }
        }

        async function calculate() {
            const val1 = document.getElementById('val1').value;
            const val2 = document.getElementById('val2')?.value;
            const resultBox = document.getElementById('result-box');

            const response = await fetch('/api/calculate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mode: currentMode, val1, val2 })
            });

            const data = await response.json();
            resultBox.style.display = 'block';
            resultBox.className = 'success';
            resultBox.innerText = "Result: " + data.result;
        }
    </script>
</body>
</html>
