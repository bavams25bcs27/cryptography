<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AES-128 ECB / CBC Demo</title>
<style>
body{font-family:Arial;margin:20px;background:#f2f2f2;}
.box{background:#fff;padding:20px;border-radius:10px;max-width:1000px;margin:auto;}
input, button{padding:6px;margin:5px;font-size:14px;}
table{border-collapse:collapse;margin:5px 0;}
td{width:30px;text-align:center;}
hr{border:1px dashed #ccc;margin:10px 0;}
</style>
</head>
<body>
<div class="box">
<h2>AES-128 Encryption Demo</h2>

<label>Plaintext (any length): </label><br>
<input type="text" id="pt" size="50"><br>

<label>Key (16 chars): </label><br>
<input type="text" id="key" size="20"><br>

<label>IV (16 chars, for CBC only): </label><br>
<input type="text" id="iv" size="20"><br>

<button onclick="encryptAES_ECB()">Encrypt (ECB)</button>
<button onclick="encryptAES_CBC()">Encrypt (CBC)</button>
<button onclick="decryptAES_ECB()">Decrypt (ECB)</button>
<button onclick="decryptAES_CBC()">Decrypt (CBC)</button>

<div id="out"></div>
</div>

<script src="aes.js"></script>
</body>
</html>
